<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL: VICTORY PATH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --neon-red: #ff3131;
            --terminal-bg: #050505;
        }
        body {
            background-color: var(--terminal-bg);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none; z-index: 100;
        }
        .terminal-window {
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            background: rgba(0, 20, 20, 0.95);
            width: 95%;
            max-width: 550px;
            padding: 20px;
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }
        .ext-mode {
            border-color: var(--neon-red) !important;
            box-shadow: 0 0 30px rgba(255, 49, 49, 0.3) !important;
            background: rgba(30, 0, 0, 0.95) !important;
        }
        .btn-sf {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-sf:hover:not(:disabled) {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .btn-sf:disabled { opacity: 0.3; cursor: not-allowed; }
        
        input {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            text-align: center;
            font-size: 1.5rem;
            padding: 10px;
            outline: none;
            width: 100%;
        }
        .ext-mode input {
            border-color: var(--neon-red) !important;
            color: var(--neon-red) !important;
        }

        #mail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }
        #mail-overlay.active { opacity: 1; pointer-events: auto; }
        .mail-content { border: 1px solid #444; background: #111; width: 100%; max-width: 500px; padding: 30px; }
        .mail-body { line-height: 1.8; white-space: pre-wrap; }

        .thinking::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>

    <!-- ストーリー画面 -->
    <div id="story-screen" class="fixed inset-0 bg-black z-50 flex items-center justify-center p-8 text-center">
        <div class="max-w-md">
            <h2 class="text-2xl mb-4 text-cyan-400 font-bold tracking-tighter italic" id="story-title">MISSION INITIALIZING</h2>
            <p class="text-cyan-100 leading-relaxed mb-8 border-l-2 border-cyan-500 pl-4 text-left" id="story-text">
                西暦2099年。革命の刻が来た。<br>
                君は伝説のハッカー「GHOST」として、<br>
                巨大企業のメインフレームを突破せよ。<br><br>
                猶予は10サイクル。<br>
                失敗すれば君の意識は消去される...
            </p>
            <button id="start-button" class="btn-sf w-full">通常ミッション開始 [LINK_START]</button>
        </div>
    </div>

    <!-- メール画面 -->
    <div id="mail-overlay">
        <div class="mail-content border-cyan-900">
            <div class="mb-4 text-xs text-gray-500 border-b border-gray-800 pb-2">
                FROM: <span id="mail-from">UNKNOWN</span><br>
                SUBJECT: <span id="mail-subject">---</span>
            </div>
            <div id="mail-body" class="mail-body text-sm"></div>
            <button id="mail-close-button" class="btn-sf w-full mt-8">通信を遮断する [CLOSE]</button>
        </div>
    </div>

    <!-- メイン画面 -->
    <div class="terminal-window hidden" id="game-screen">
        <div class="flex justify-between text-[10px] mb-4 font-bold opacity-50">
            <span id="game-mode-label">STANDARD_LINK</span>
            <span id="range-label">RANGE: 001-100</span>
        </div>

        <div class="flex justify-around mb-6 py-2 bg-black/40 border-y border-cyan-900/50">
            <div id="player-label" class="px-4 transition-all duration-300 border-b-2 border-cyan-400">
                <p class="text-[10px] opacity-60 text-center uppercase">Player</p>
                <span class="font-bold">GHOST</span>
            </div>
            <div class="text-xl font-bold self-center opacity-30">VS</div>
            <div id="ai-label" class="px-4 transition-all duration-300">
                <p class="text-[10px] opacity-60 text-center uppercase">Security</p>
                <span id="ai-name" class="font-bold text-magenta-500">NEPENTHES</span>
            </div>
        </div>

        <div id="terminal-output" class="text-[12px] h-36 overflow-y-auto mb-4 bg-black/80 p-3 border border-cyan-950 font-mono space-y-1"></div>

        <div id="input-area" class="space-y-4">
            <div class="relative">
                <input type="number" id="guess-input" placeholder="CODE" min="1" max="100">
                <div id="ai-thinking" class="hidden absolute inset-0 bg-black/90 flex items-center justify-center text-magenta-500 font-bold italic">
                    <span class="thinking">AI_ANALYZING</span>
                </div>
            </div>
            <button id="guess-button" class="btn-sf w-full">コード送信 [UPLOAD]</button>
        </div>

        <div id="control-buttons" class="hidden flex gap-2 mt-4">
            <button id="reset-button" class="btn-sf flex-1">再起動 [REBOOT]</button>
            <button id="extra-button" class="btn-sf flex-1 hidden border-red-600 text-red-500 shadow-[0_0_10px_rgba(255,0,0,0.5)]">最終決戦 [EXT_WAR]</button>
        </div>

        <div class="mt-4 text-[9px] opacity-40 text-center uppercase tracking-widest">Neural Link Sync: Active</div>
    </div>

    <script>
        let state = {
            target: 0,
            isGameOver: false,
            turn: 'player',
            aiRange: { min: 1, max: 100 },
            isExtra: false,
            maxRange: 100
        };

        const dom = {
            story: document.getElementById('story-screen'),
            storyText: document.getElementById('story-text'),
            storyTitle: document.getElementById('story-title'),
            game: document.getElementById('game-screen'),
            start: document.getElementById('start-button'),
            input: document.getElementById('guess-input'),
            button: document.getElementById('guess-button'),
            terminal: document.getElementById('terminal-output'),
            playerLabel: document.getElementById('player-label'),
            aiLabel: document.getElementById('ai-label'),
            aiThinking: document.getElementById('ai-thinking'),
            reset: document.getElementById('reset-button'),
            extra: document.getElementById('extra-button'),
            controls: document.getElementById('control-buttons'),
            mailOverlay: document.getElementById('mail-overlay'),
            mailFrom: document.getElementById('mail-from'),
            mailSubject: document.getElementById('mail-subject'),
            mailBody: document.getElementById('mail-body'),
            mailClose: document.getElementById('mail-close-button'),
            rangeLabel: document.getElementById('range-label'),
            modeLabel: document.getElementById('game-mode-label'),
            aiName: document.getElementById('ai-name')
        };

        const MESSAGES = {
            win: { from: "REBEL_HQ", subject: "MISSION_SUCCESS", body: "GHOST、よくやった。データの回収に成功した。\nこれで奴らの嘘を暴くための『鍵』が手に入った。\nだが戦いは最高潮を迎えている。最終兵器イカロスへの道が開かれた。準備はいいか？" },
            lose: { from: "SYS_SECURITY", subject: "ACCESS_DENIED", body: "侵入者を確認。ニューラルリンクを切断した。\n治安維持部隊を派遣。抵抗は無意味だ。\n（ヒント：通常ミッションをクリアしなければ、最終決戦へは進めない...）" },
            winExt: { from: "FREEDOM_FRONT", subject: "REVOLUTION_DAY", body: "イカロスは沈黙した！革命戦争は我々の勝利だ！\nGHOST、君は伝説として歴史に刻まれるだろう。\n全ての市民が君の名を叫んでいる。自由が、ついに我々の手に。" },
            loseExt: { from: "CORP_OVERLORD", subject: "NEW_ORDER", body: "最終兵器イカロスが起動した。世界の再構築が始まる。\n君の失敗は、人類が最後に犯した過ちとなるだろう。\n永遠の静寂を享受せよ。" }
        };

        function addLog(sender, msg, color = 'text-cyan-400') {
            const div = document.createElement('div');
            div.className = `${color} leading-tight`;
            div.innerHTML = `<span class="opacity-50">>></span> [${sender}] ${msg}`;
            dom.terminal.appendChild(div);
            dom.terminal.scrollTop = dom.terminal.scrollHeight;
        }

        function initGame(isExtra = false) {
            state.isExtra = isExtra;
            state.maxRange = isExtra ? 1000 : 100;
            state.target = Math.floor(Math.random() * state.maxRange) + 1;
            state.isGameOver = false;
            state.turn = 'player';
            state.aiRange = { min: 1, max: state.maxRange };

            dom.game.classList.toggle('ext-mode', isExtra);
            dom.rangeLabel.innerText = `RANGE: 001-${state.maxRange}`;
            dom.modeLabel.innerText = isExtra ? "EXTENDED_WARFRONT" : "STANDARD_LINK";
            dom.aiName.innerText = isExtra ? "ICARUS_CORE" : "NEPENTHES";
            dom.input.placeholder = `INPUT (1-${state.maxRange})`;
            dom.input.disabled = false;
            dom.input.value = '';
            dom.button.classList.remove('hidden');
            dom.controls.classList.add('hidden');
            dom.extra.classList.add('hidden'); // 開始時は常に隠す
            dom.mailOverlay.classList.remove('active');
            dom.terminal.innerHTML = '';
            
            addLog('SYSTEM', `${isExtra ? '最終決戦' : '通常'}ミッション開始。`);
            updateTurnUI();
        }

        function updateTurnUI() {
            if (state.turn === 'player') {
                dom.playerLabel.className = `px-4 transition-all duration-300 border-b-2 ${state.isExtra ? 'border-red-500 text-red-500' : 'border-cyan-400 text-cyan-400'}`;
                dom.aiLabel.className = 'px-4 transition-all duration-300';
                dom.input.focus();
            } else {
                dom.playerLabel.className = 'px-4 transition-all duration-300';
                dom.aiLabel.className = `px-4 transition-all duration-300 border-b-2 ${state.isExtra ? 'border-red-500' : 'border-pink-500'}`;
            }
        }

        function playerAction() {
            if (state.isGameOver || state.turn !== 'player') return;
            const guess = parseInt(dom.input.value);
            if (isNaN(guess) || guess < 1 || guess > state.maxRange) return;

            addLog('GHOST', `UPLOAD: ${guess}`);
            if (guess === state.target) { endGame(true); return; }

            addLog('SYSTEM', guess < state.target ? "LOW: 数値不足" : "HIGH: 数値超過", 'text-yellow-500');
            state.aiRange[guess < state.target ? 'min' : 'max'] = guess + (guess < state.target ? 1 : -1);
            
            state.turn = 'ai';
            dom.input.value = '';
            updateTurnUI();
            setTimeout(aiAction, 1000);
        }

        function aiAction() {
            if (state.isGameOver) return;
            dom.aiThinking.classList.remove('hidden');
            setTimeout(() => {
                const range = state.aiRange.max - state.aiRange.min;
                let aiGuess = Math.floor(state.aiRange.min + (range / 2));
                if (range > 4) aiGuess += Math.floor(Math.random() * 3) - 1;
                
                dom.aiThinking.classList.add('hidden');
                addLog('AI', `SCANNING: ${aiGuess}`, state.isExtra ? 'text-red-500' : 'text-pink-500');

                if (aiGuess === state.target) { endGame(false); return; }
                
                addLog('SYSTEM', aiGuess < state.target ? "LOW: 解析エラー" : "HIGH: 解析過剰", 'text-yellow-500');
                state.aiRange[aiGuess < state.target ? 'min' : 'max'] = aiGuess + (aiGuess < state.target ? 1 : -1);
                
                state.turn = 'player';
                updateTurnUI();
            }, 1200);
        }

        function endGame(won) {
            state.isGameOver = true;
            dom.input.disabled = true;
            dom.button.classList.add('hidden');
            dom.controls.classList.remove('hidden');

            // プレイヤーが勝利した場合のみ、かつ通常ステージの場合のみエクストラを出現させる
            if (won && !state.isExtra) {
                dom.extra.classList.remove('hidden');
            } else {
                dom.extra.classList.add('hidden');
            }

            const msgType = state.isExtra ? (won ? 'winExt' : 'loseExt') : (won ? 'win' : 'lose');
            const data = MESSAGES[msgType];
            
            setTimeout(() => {
                dom.mailOverlay.classList.add('active');
                dom.mailFrom.innerText = data.from;
                dom.mailSubject.innerText = data.subject;
                dom.mailBody.innerText = "";
                let i = 0;
                function type() {
                    if (i < data.body.length) {
                        dom.mailBody.innerText += data.body.charAt(i); i++;
                        setTimeout(type, 20);
                    }
                }
                type();
            }, 1500);
        }

        dom.start.addEventListener('click', () => {
            dom.story.classList.add('hidden');
            dom.game.classList.remove('hidden');
            initGame(false);
        });

        dom.button.addEventListener('click', playerAction);
        dom.input.addEventListener('keypress', (e) => e.key === 'Enter' && playerAction());
        dom.reset.addEventListener('click', () => initGame(false));
        
        dom.extra.addEventListener('click', () => {
            dom.story.classList.remove('hidden');
            dom.storyTitle.innerText = "FINAL FRONT: PROJECT ICARUS";
            dom.storyTitle.className = "text-2xl mb-4 text-red-500 font-bold tracking-tighter italic";
            dom.storyText.innerHTML = "革命戦争は激化し、世界は崩壊の危機にある。<br>企業の最終兵器「イカロス」が起動した。<br>残された時間はわずか。1000のアドレスから<br>停止コードを見つけ出し、地獄を終わらせろ。<br><br>これこそが、最後の戦いだ。";
            dom.start.innerText = "最終決戦開始 [EXT_WAR_START]";
            dom.start.className = "btn-sf w-full border-red-600 text-red-500";
            
            const newStart = (e) => {
                e.preventDefault();
                dom.story.classList.add('hidden');
                initGame(true);
                dom.start.removeEventListener('click', newStart);
            };
            dom.start.addEventListener('click', newStart);
        });

        dom.mailClose.addEventListener('click', () => dom.mailOverlay.classList.remove('active'));
    </script>
</body>
</html>
